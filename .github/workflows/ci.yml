name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    env:
      mongo_uri: ${{ secrets.MONGO_URI }}
      mongo_database: ${{ secrets.MONGO_DATABASE }}
      mongo_collection: ${{ secrets.MONGO_COLLECTION }}

      chunk_size: ${{ secrets.CHUNK_SIZE }}
      chunk_overlap: ${{ secrets.CHUNK_OVERLAP }}

      embedding_model: ${{ secrets.EMBEDDING_MODEL }}

      vectorstore_path: ${{ secrets.VECTORSTORE_PATH }}
      raw_storage_path: ${{ secrets.RAW_STORAGE_PATH }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Storage Directories
        run: |
          mkdir -p storage/raw
          mkdir -p storage/vectorstore

      - name: Run Tests
        run: |
          pytest -v

      - name: Generate Coverage Report
        run: |
          pytest --cov=src --cov-report=term